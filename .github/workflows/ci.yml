name: Build and Push Docker image to GHCR

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Set lowercase owner
        id: vars
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        env:
          OWNER_LC: ${{ env.OWNER_LC }}
          TAG: ${{ env.TAG }}
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/server:${{ env.TAG }}
            ghcr.io/${{ env.OWNER_LC }}/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Deploy to production
      #   run: |
      #     curl --request POST '${{ secrets.DEPLOYMENT_WEBHOOK }}' --header 'Authorization: Bearer ${{ secrets.DEPLOYMENT_API_TOKEN }}' --header 'Content-Type: application/json' --data '{"message": "Server deployed successfully"}'
