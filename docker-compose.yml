services:
  server:
    build: .
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/evd
      - PORT=4000
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=http://localhost:4000
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - UPLOAD_DIR=./uploads
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=evd_data
      - POSTGRES_APP_DB=evd_app
      - POSTGRES_USER=evd_analytics
      - POSTGRES_PASSWORD=evd_password
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongo
      - postgres
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=evd_data
      - POSTGRES_USER=evd_analytics
      - POSTGRES_PASSWORD=evd_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

volumes:
  mongo-data:
  postgres-data:
  uploads:
