services:
  server:
    build: .
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/evd
      - PORT=4000
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=http://localhost:4000
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - UPLOAD_DIR=./uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
  uploads:
